services:
  # Proxy Reverso - Único punto expuesto al exterior
  nginx:
    build: ./nginx
    container_name: nginx_proxy
    depends_on:
      - frontend
      - backend
      - fhir-server
      - minio
      - mlflow
      - orchestrator
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - clinical_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend SPA React/Vite
  frontend:
    build: ./frontend
    container_name: frontend_spa
    depends_on:
      - backend
    networks:
      - clinical_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend FastAPI - API FHIR + Auth
  backend:
    build: ./backend
    container_name: backend_api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEFAULT_ACCESS_KEY=${DEFAULT_ACCESS_KEY}
      - DEFAULT_PERMISSION_KEY=${DEFAULT_PERMISSION_KEY}
      - DEFAULT_MEDICO_ACCESS_KEY_1=${DEFAULT_MEDICO_ACCESS_KEY_1}
      - DEFAULT_MEDICO_ACCESS_KEY_2=${DEFAULT_MEDICO_ACCESS_KEY_2}
      - DEFAULT_PACIENTE_ACCESS_KEY_1=${DEFAULT_PACIENTE_ACCESS_KEY_1}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=clinical-images
      - MAILHOG_HOST=mailhog
      - MAILHOG_PORT=1025
      - FHIR_SERVER_URL=http://fhir-server:8080/fhir
      - ENV=development
      - DATASET_PATH=/datasets/heart-disease.csv
      - AUTO_SEED_HEART_DATASET=true
    depends_on:
      - postgres
      - minio
      - mailhog
    ports:
      - '8000:8000'
    volumes:
      - ./datasets:/datasets:ro
    networks:
      - clinical_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HAPI FHIR Server R4
  fhir-server:
    image: hapiproject/hapi:latest
    container_name: fhir_hapi
    environment:
      - HAPI_PORT=8080
    ports:
      - '8080:8080'
    networks:
      - clinical_net

  # ML Service - Tabular XGBoost ONNX
  ml-service:
    build: ./ml-service
    container_name: ml_service
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATASET_PATH=/datasets/heart-disease.csv
    depends_on:
      - mlflow
    volumes:
      - ./datasets:/datasets:ro
    ports:
      - '8001:8001'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DL Service - ECG image ONNX inference
  dl-service:
    build: ./dl-service
    container_name: dl_service
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=clinical-images
      - ECG_DATASET_PATH=/datasets/ecg-images
      - DL_LOCAL_IMAGE_DIR=/datasets/ecg-images
      - DL_MINIO_SEED_PREFIX=seed/ecg
      - DL_SEED_MAX_UPLOAD=300
    depends_on:
      - minio
    volumes:
      - ./datasets:/datasets:ro
    ports:
      - '8003:8003'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Orchestrator - Concurrencia asyncio(4)
  orchestrator:
    build: ./orchestrator
    container_name: orchestrator_async
    environment:
      - MAX_WORKERS=4
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - ml-service
      - dl-service
      - postgres
    ports:
      - '8002:8002'
    volumes:
      - ./orchestrator:/app
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO S3 - Almacenamiento Imágenes
  minio:
    image: minio/minio:latest
    container_name: minio_s3
    command: minio server /data --console-address ":9001"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - '9002:9000'
      - '9003:9001'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Init - Crear bucket clinical-images
  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb minio/clinical-images || true;
      exit 0;
      "
    networks:
      - clinical_net

  # PostgreSQL - Base de datos normalizada
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - '5433:5432'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MLflow - Model Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_tracking
    command: mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow --host 0.0.0.0 --port 5000
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - mlflow_data:/mlflow
    ports:
      - '5000:5000'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mailhog - SMTP para alertas
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog_smtp
    ports:
      - '1026:1025'
      - '8026:8025'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8025"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  mlflow_data:
    driver: local

networks:
  clinical_net:
    driver: bridge

